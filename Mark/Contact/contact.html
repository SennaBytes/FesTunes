<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="contact.css">
</head>
<body>

  <nav>
    <span class="logo"><img src="../assets/Logo-FesTune.png" alt="Logo"></span>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="#">Date</a></li>
      <li><a href="#">Orde Page</a></li>
      <li><a href="#">Gallery</a></li>
    </ul>
  </nav>

  <main>
    <h1>Contact us</h1>
    <p class="subtitle">
      Have a question or want to get in touch? We'd love to hear from you. Fill in the form and we'll get back to you as soon as possible.
    </p>

    <div class="form-layout">
      <div class="form-left">
        <div class="form-group">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" placeholder="Your name"/>
        </div>
        <div class="form-group">
          <label for="email">E-mail:</label>
          <input type="email" id="email" name="email" placeholder="Your e-mail"/>
        </div>
        <div class="form-group">
          <label for="phone">Phone-Number:</label>
          <input type="tel" id="phone" name="phone" placeholder="Your phone number"/>
        </div>
      </div>
      <div class="form-right">
        <textarea id="message" name="message" placeholder="Message..."></textarea>
      </div>
    </div>

    <div class="submit-row">
      <button type="submit">Send</button>
    </div>
  </main>

</body>
</html>
